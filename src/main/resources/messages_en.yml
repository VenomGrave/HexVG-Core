general:
  prefix: "<dark_gray>[<gradient:#5865F2:#9B59B6>HexVG</gradient>]</dark_gray> "
  no-permission: "{prefix}<red>You don't have permission to use this command."
  player-only: "{prefix}<red>This command can only be used by players."
  player-not-found: "{prefix}<red>Player <yellow>{player}</yellow> not found."
  invalid-number: "{prefix}<red>The provided value is not a valid number."
  invalid-usage: "{prefix}<red>Usage: <yellow>{usage}</yellow>."
  reload-success: "{prefix}<green>Plugin reloaded successfully."
  reload-failed: "{prefix}<red>Error during reload. Check the console."
  console-sender: "Console"
  unknown-command: "{prefix}<red>Unknown command. Type <yellow>/help</yellow>."

database:
  connecting: "{prefix}<gray>Connecting to database <yellow>{name}</yellow>..."
  connected: "{prefix}<green>Connected to database <yellow>{name}</yellow>."
  connection-failed: "{prefix}<red>Failed to connect to <yellow>{name}</yellow>: <gray>{error}"
  reconnecting: "{prefix}<yellow>Reconnecting to <gold>{name}</gold> ({attempt}/{max})..."
  reconnect-failed: "{prefix}<red>All reconnect attempts failed for <yellow>{name}</yellow>."

session:
